<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>经营罗盘</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #335cff;
      --primary-soft: #eef2ff;
      --success: #059669;
      --success-soft: #ecfdf3;
      --warning: #d97706;
      --warning-soft: #fff7ed;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef3ff 0%, #f7f9fc 18%, var(--bg) 100%);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 248px 1fr;
    }

    .sidebar {
      padding: 20px 18px;
      background: #0f172a;
      color: #f8fafc;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 6px;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4f7cff 0%, #335cff 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 12px 28px rgba(51, 92, 255, 0.26);
    }

    .logo h1 {
      margin: 0 0 2px;
      font-size: 22px;
      line-height: 1.2;
    }

    .logo p,
    .side-note,
    .nav-item span {
      margin: 0;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.6;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-item {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #f8fafc;
      border-radius: 14px;
      padding: 14px 14px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .nav-item:hover {
      transform: translateY(-1px);
      border-color: rgba(148, 163, 184, 0.36);
    }

    .nav-item.active {
      background: rgba(51, 92, 255, 0.2);
      border-color: rgba(129, 140, 248, 0.72);
    }

    .nav-item strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .topbar,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .topbar h2 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .topbar p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
    }

    .chip.primary {
      background: var(--primary-soft);
      border-color: #c7d2fe;
      color: var(--primary);
    }

    .primary-btn,
    .ghost-btn,
    .soft-btn,
    .danger-btn {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
      font-weight: 600;
    }

    .primary-btn:hover,
    .ghost-btn:hover,
    .soft-btn:hover,
    .danger-btn:hover {
      transform: translateY(-1px);
    }

    .primary-btn {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 18px rgba(51, 92, 255, 0.18);
    }

    .ghost-btn {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .soft-btn {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .danger-btn {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .workspace {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .embed-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .embed-frame {
      width: 100%;
      height: calc(100vh - 40px);
      min-height: 900px;
      border: 0;
      display: block;
      background: #fff;
    }

    .metrics,
    .grid-3,
    .grid-2 {
      display: grid;
      gap: 16px;
    }

    .metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .metric-card,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
    }

    .metric-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
    }

    .metric-value {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .metric-trend {
      font-size: 13px;
    }

    .up {
      color: var(--success);
    }

    .down {
      color: var(--danger);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .card-head h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .card-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .insight-card,
    .task-card,
    .package-card,
    .timeline-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: var(--panel-soft);
    }

    .insight-card h4,
    .task-card h4,
    .package-card h4,
    .timeline-card h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .insight-card p,
    .task-card p,
    .package-card p,
    .timeline-card p,
    .table td,
    .table th {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .insight-top,
    .package-top,
    .task-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .tag.primary {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: #c7d2fe;
    }

    .tag.success {
      background: var(--success-soft);
      color: var(--success);
      border-color: #b7ebc6;
    }

    .tag.neutral {
      background: #f1f5f9;
      color: #64748b;
      border-color: #cbd5e1;
    }

    .tag.warning {
      background: var(--warning-soft);
      color: var(--warning);
      border-color: #fed7aa;
    }

    .tag.danger {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: #fecaca;
    }

    .meta-row,
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .meta {
      padding: 7px 10px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .table-wrap {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th,
    .table td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }

    .table th {
      background: #f8fafc;
      color: #334155;
      font-weight: 600;
      font-size: 12px;
    }

    .table tr:last-child td {
      border-bottom: none;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }

    .dot-success {
      background: var(--success);
    }

    .dot-warning {
      background: var(--warning);
    }

    .dot-danger {
      background: var(--danger);
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .compare-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: var(--panel-soft);
    }

    .compare-box h4 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    .compare-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--line);
      font-size: 13px;
      color: var(--muted);
    }

    .compare-row strong {
      color: var(--text);
    }

    .compare-row:last-child {
      border-bottom: none;
    }

    .calendar-wrap {
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .calendar-12 {
      display: grid;
      grid-template-columns: repeat(12, minmax(116px, 1fr));
      gap: 12px;
      min-width: 1560px;
    }

    .month-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: var(--panel-soft);
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-height: 126px;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }

    .month-card.active {
      background: var(--primary-soft);
      border-color: #c7d2fe;
    }

    .month-card h4 {
      margin: 0;
      font-size: 15px;
    }

    .month-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .month-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .trend-board {
      display: grid;
      grid-template-columns: 1fr;
      margin-bottom: 16px;
    }

    .scope-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .trend-chart,
    .define-block,
    .plan-card,
    .alert-block {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: var(--panel-soft);
    }

    .trend-chart {
      overflow-x: auto;
    }

    .trend-chart svg {
      width: 100%;
      min-width: 1560px;
      height: 262px;
      display: block;
    }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-line {
      width: 24px;
      height: 3px;
      border-radius: 999px;
    }

    .legend-line.sales {
      background: #335cff;
    }

    .legend-line.revenue {
      background: #06b6d4;
    }

    .legend-line.week-actual {
      background: #335cff;
    }

    .legend-line.week-target {
      background: #94a3b8;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .summary-card h4 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .summary-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .editable-summary {
      margin: 0;
      min-height: 0;
      padding: 0;
      border: none;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      outline: none;
    }

    .editable-summary:empty {
      display: none;
    }

    .editable-summary:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
    }

    .overview-grid {
      display: grid;
      grid-template-columns: 0.88fr 1.52fr;
      gap: 16px;
    }

    .plan-block,
    .data-block,
    .insight-block,
    .overview-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: var(--panel-soft);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .decision-grid,
    .plan-grid,
    .alert-grid {
      display: grid;
      gap: 16px;
    }

    .decision-grid {
      grid-template-columns: 1.15fr 1fr;
    }

    .plan-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .alert-grid {
      grid-template-columns: 1.2fr 1fr;
    }

    .block-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .block-title h4 {
      margin: 0;
      font-size: 16px;
    }

    .mini-kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-kpi {
      padding: 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
    }

    .mini-kpi .name {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .mini-kpi .num {
      font-size: 20px;
      font-weight: 700;
    }

    .mini-kpi .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .split-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    .split-row {
      display: grid;
      grid-template-columns: 64px 1fr 44px;
      align-items: center;
      gap: 12px;
      padding: 2px 0;
      font-size: 13px;
      color: var(--muted);
    }

    .split-row strong {
      text-align: right;
      color: #334155;
      font-size: 13px;
    }

    .goal-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .goal-chip {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: #475569;
      font-size: 12px;
    }

    .target-metric-grid,
    .actual-mix-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .target-metric-card {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .target-metric-card label,
    .actual-mix-card .name {
      color: var(--muted);
      font-size: 12px;
    }

    .target-metric-card input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
    }

    .target-metric-card input[readonly] {
      background: #f8fafc;
      color: #334155;
      cursor: default;
    }

    .actual-mix-card {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .actual-mix-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .actual-mix-top strong {
      color: var(--text);
      font-size: 14px;
    }

    .strategy-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .strategy-group-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .strategy-group {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
    }

    .strategy-group-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .strategy-group-head h5 {
      margin: 0;
      font-size: 14px;
    }

    .strategy-count {
      color: var(--muted);
      font-size: 12px;
    }

    .strategy-item {
      padding: 10px 0 0;
      margin-top: 10px;
      border-top: 1px dashed var(--line);
    }

    .strategy-item:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .strategy-item-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .strategy-item-head h6 {
      margin: 0;
      font-size: 14px;
    }

    .strategy-item p,
    .strategy-empty {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .strategy-empty {
      padding: 6px 0 2px;
    }

    .strategy-line-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .strategy-line {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-top: 1px dashed var(--line);
      font-size: 13px;
    }

    .strategy-line:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .strategy-status {
      font-size: 12px;
      font-weight: 600;
    }

    .strategy-status.running {
      color: var(--success);
    }

    .strategy-status.available {
      color: var(--muted);
    }

    .strategy-name {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
    }

    .strategy-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .strategy-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .text-btn {
      border: none;
      background: transparent;
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 2px 0 0;
    }

    .strategy-board {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .strategy-card {
      border: 1px solid #e5ebf3;
      border-radius: 14px;
      background: #f8fafc;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .strategy-card-head h5 {
      margin: 0;
      font-size: 15px;
    }

    .strategy-card-head p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .strategy-card-title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .strategy-inline-desc {
      flex: 1;
      min-width: 240px;
    }

    .strategy-inline-desc::before {
      content: "·";
      margin-right: 8px;
      color: #cbd5e1;
    }

    .section-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .strategy-info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .strategy-info-block {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .strategy-info-block .name {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .strategy-info-block .value {
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
    }

    .strategy-follow-toggle {
      width: 100%;
      border: 1px dashed #cbd5e1;

    function formatNaturalWeekDate(date) {
      return `${String(date.getMonth() + 1).padStart(2, "0")}.${String(date.getDate()).padStart(2, "0")}`;
    }

    function getYearWeekNumber(date) {
      const current = new Date(date);
      current.setHours(0, 0, 0, 0);
      const day = current.getDay() || 7;
      current.setDate(current.getDate() + 4 - day);
      const yearStart = new Date(current.getFullYear(), 0, 1);
      return Math.ceil((((current - yearStart) / 86400000) + 1) / 7);
    }

    function getNaturalWeekStatus(start, end) {
      const today = new Date(2026, 5, 17);
      if (today < start) return "未开始";
      if (today > end) return "已结束";
      return "当前周";
    }

    function getMonthNaturalWeeks(month) {
      const year = 2026;
      const monthStart = new Date(year, month - 1, 1);
      const monthEnd = new Date(year, month, 0);
      const firstWeekStart = new Date(monthStart);
      const weekOffset = (monthStart.getDay() + 6) % 7;
      firstWeekStart.setDate(firstWeekStart.getDate() - weekOffset);
      const weeks = [];

      for (let cursor = new Date(firstWeekStart); cursor <= monthEnd; cursor.setDate(cursor.getDate() + 7)) {
        const start = new Date(cursor);
        const end = new Date(cursor);
        end.setDate(end.getDate() + 6);
        if (end < monthStart || start > monthEnd) continue;
        weeks.push({ start, end });
      }

      const visibleWeeks = weeks.length > 5 ? weeks.slice(-5) : weeks;
      return visibleWeeks.map((item, index) => {
        const status = getNaturalWeekStatus(item.start, item.end);
        const weekNumber = getYearWeekNumber(item.start);
        return {
          key: `${month}-${formatNaturalWeekDate(item.start)}`,
          week: `W${weekNumber}`,
          shortWeek: `${formatNaturalWeekDate(item.start)}-${formatNaturalWeekDate(item.end)}`,
          status,
          isCurrent: status === "当前周"
        };
      });
    }

    function renderConsoleRadar(radar) {
      const items = radar.items;
      const centerX = 200;
      const centerY = 150;
      const radius = 82;
      const angleStep = Math.PI * 2 / items.length;
      const startAngle = -Math.PI / 2;
      const pointFor = (score, index, scale = 1) => {
        const ratio = (score / 100) * scale;
        const angle = startAngle + angleStep * index;
        return {
          x: centerX + Math.cos(angle) * radius * ratio,
          y: centerY + Math.sin(angle) * radius * ratio
        };
      };
      const labelFor = index => {
        const angle = startAngle + angleStep * index;
        return {
          x: centerX + Math.cos(angle) * 132,
          y: centerY + Math.sin(angle) * 132
        };
      };
      const anchorFor = x => {
        if (x < centerX - 18) return "end";
        if (x > centerX + 18) return "start";
        return "middle";
      };
      const levelPoints = [0.25, 0.5, 0.75, 1].map(level => items.map((_, index) => {
        const point = pointFor(100, index, level);
        return `${point.x},${point.y}`;
      }).join(" "));
      const currentPoints = items.map((item, index) => {
        const point = pointFor(item.plot, index);
        return `${point.x},${point.y}`;
      }).join(" ");
      const lastPoints = items.map((item, index) => {
        const point = pointFor(item.lastPlot, index);
        return `${point.x},${point.y}`;
      }).join(" ");
      return `
        <svg viewBox="0 0 420 320" xmlns="http://www.w3.org/2000/svg" aria-label="全局分析评分雷达图">
          ${levelPoints.map(points => `<polygon points="${points}" fill="none" stroke="#e2e8f0" stroke-width="1"/>`).join("")}
          ${items.map((item, index) => {
            const outer = pointFor(100, index);
            return `<line x1="${centerX}" y1="${centerY}" x2="${outer.x}" y2="${outer.y}" stroke="#e2e8f0" stroke-width="1"/>`;
          }).join("")}
          <polygon points="${lastPoints}" fill="rgba(148, 163, 184, 0.08)" stroke="#94a3b8" stroke-width="2"/>
          <polygon points="${currentPoints}" fill="rgba(51, 92, 255, 0.12)" stroke="#335cff" stroke-width="2.4"/>
          ${items.map((item, index) => {
            const current = pointFor(item.plot, index);
            const last = pointFor(item.lastPlot, index);
            const label = labelFor(index);
            const anchor = anchorFor(label.x);
            const inner = pointFor(item.lastPlot * 0.88, index);
            return `
              <circle cx="${last.x}" cy="${last.y}" r="3.5" fill="#94a3b8"/>
              <circle cx="${current.x}" cy="${current.y}" r="4" fill="#335cff"/>
              <text x="${label.x}" y="${label.y}" fill="#111827" font-size="12" font-weight="600" text-anchor="${anchor}">${item.label}</text>
              <text x="${label.x}" y="${label.y + 16}" fill="#335cff" font-size="11" text-anchor="${anchor}">${item.value}</text>
              <text x="${inner.x}" y="${inner.y}" fill="#94a3b8" font-size="10" text-anchor="middle">${item.lastValue}</text>
            `;
          }).join("")}
        </svg>
      `;
    }

    function getWeekTrend(month) {
      const map = {
        1: [96, 100, 108, 112, 106, 101],
        2: [92, 89, 86, 88, 90, 91],
        3: [91, 90, 94, 92, 95, 93],
        4: [90, 88, 87, 89, 90, 92],
        5: [94, 96, 99, 95, 97, 98],
        6: [96, 98, 101, 104, 108, 110],
        7: [101, 108, 110, 118, 124, 116],
        8: [110, 116, 121, 128, 132, 126],
        9: [124, 120, 113, 108, 104, 102],
        10: [103, 101, 99, 100, 101, 102],
        11: [100, 103, 106, 111, 114, 110],
        12: [112, 116, 121, 128, 134, 138]
      };
      return map[month] || map[7];
    }

    function getWeekSnapshot(current) {
      const revenue = Math.round(parseWanAmount(current.metrics.revenue) / 4);
      const point = Math.round(parseWanAmount(current.metrics.point) * 1.02);
      const stores = Math.min(Math.max(current.storeRows.length + 6, 8), current.staffing.stores);
      return {
        revenue: `￥${revenue}万`,
        point: `￥${point}`,
        stores: `${stores} 家`
      };
    }

    function getWeekMetrics(month, current) {
      const trend = getWeekTrend(month).slice(2);
      const revenueBase = parseWanAmount(current.metrics.revenue) / 4;
      const pointBase = parseWanAmount(current.metrics.point);
      return trend.map((value, index) => {
        const factor = value / 100;
        return {
          week: `W${index + 1}`,
          revenue: `￥${Math.round(revenueBase * factor)}万`,
          point: `￥${Math.round(pointBase * (factor * 0.98 + 0.02))}`
        };
      });
    }

    function getActiveWeekIndex(current) {
      const index = current.weekPlans.findIndex(item => item.active);
      return index >= 0 ? index : 1;
    }

    function getWeekTargetMetrics(month, current) {
      const goalRevenue = parseWanAmount(getGoalValues(month, current).revenue);
      const weights = getWeekTrend(month).slice(2);
      const totalWeight = weights.reduce((sum, item) => sum + item, 0) || 1;
      return weights.map((weight, index) => ({
        week: `W${index + 1}`,
        revenue: Math.round(goalRevenue * weight / totalWeight)
      }));
    }

    function getWeekChartData(month, current) {
      const activeWeekIndex = getActiveWeekIndex(current);
      const currentWeekActual = getWeekMetrics(month, current).map(item => parseWanAmount(item.revenue));
      const targetWeekData = getWeekTargetMetrics(month, current).map(item => item.revenue);
      const prevMonth = month === 1 ? 12 : month - 1;
      const prevCurrent = monthData[prevMonth];
      const prevActual = getWeekMetrics(prevMonth, prevCurrent).slice(2).map(item => parseWanAmount(item.revenue));
      const prevTarget = getWeekTargetMetrics(prevMonth, prevCurrent).slice(2).map(item => item.revenue);
      return {
        labels: ["上W3", "上W4", "W1", "W2", "W3", "W4"],
        actual: [
          prevActual[0],
          prevActual[1],
          ...currentWeekActual.map((value, index) => index <= activeWeekIndex ? value : null)
        ],
        target: [prevTarget[0], prevTarget[1], ...targetWeekData],
        activeWeekIndex
      };
    }

    function formatWeekDateRange(month, startDay, endDay) {
      return `${month}/${startDay}-${month}/${endDay}`;
    }

    function getWeekRanges(month) {
      const year = 2026;
      const lastDay = new Date(year, month, 0).getDate();
      const ranges = [
        { title: "W1", start: 1, end: Math.min(7, lastDay) },
        { title: "W2", start: 8, end: Math.min(14, lastDay) },
        { title: "W3", start: 15, end: Math.min(21, lastDay) },
        { title: "W4", start: 22, end: lastDay }
      ];
      return ranges.map((item, index) => ({
        ...item,
        days: item.end - item.start + 1,
        range: formatWeekDateRange(month, item.start, item.end),
        status: index < getActiveWeekIndex(monthData[month]) ? "已结束" : index === getActiveWeekIndex(monthData[month]) ? "进行中" : "未开始"
      }));
    }

    function getWeeklyKpis(month, current) {
      const targets = getWeekTargetMetrics(month, current);
      const actuals = getWeekMetrics(month, current);
      const ranges = getWeekRanges(month);
      const aovBase = parseWanAmount(current.metrics.aov);
      const ordersBase = parseWanAmount(current.metrics.orders) / 4;
      return ranges.map((range, index) => {
        const factor = getWeekTrend(month).slice(2)[index] / 100;
        return {
          ...range,
          revenue: actuals[index].revenue,
          point: actuals[index].point,
          aov: `￥${Math.round(aovBase * (factor * 0.96 + 0.04))}`,
          orders: `${Math.round(ordersBase * factor)}`,
          revenueTarget: `￥${targets[index].revenue}万`,
          pointTarget: getGoalValues(month, current).point
        };
      });
    }

    function getWeeklyFollowups(month, current) {
      const activeWeekIndex = getActiveWeekIndex(current);
      const strategyPkgMap = {
        "高价值优先包": "高峰时段大单保护",
        "低谷托底包": "低谷时段9.5折券",
        "周度调控包": "自动开点",
        "高峰扩供包": "自动开点"
      };
      const executingTitles = [...current.strategies, current.weekPlans[activeWeekIndex]]
        .filter(item => item?.pkg)
        .map(item => strategyPkgMap[item.pkg])
        .filter(Boolean);
      const uniqueTitles = [...new Set(executingTitles)];
      return getWeekRanges(month).map((range, index) => uniqueTitles.map(title => {
        const config = getWeekFollowMetricConfig(title);
        return {
          title,
          metric: config.metric,
          value: config.values[index],
          status: index < activeWeekIndex ? "已跟进" : index === activeWeekIndex ? "跟进中" : "待跟进"
        };
      }));
    }

    function getWeekMetricTone(actual, target, status) {
      if (status === "未开始") return "";
      const actualValue = parseWanAmount(actual);
      const targetValue = parseWanAmount(target);
      if (!targetValue) return "";
      return actualValue / targetValue < 0.95 ? "bad" : "good";
    }

    function buildPolyline(points, values, yForValue) {
      const segments = [];
      let currentSegment = [];
      values.forEach((value, index) => {
        if (value === null || value === undefined) {
          if (currentSegment.length) segments.push(currentSegment);
          currentSegment = [];
          return;
        }
        currentSegment.push(`${points[index]},${yForValue(value)}`);
      });
      if (currentSegment.length) segments.push(currentSegment);
      return segments.map(segment => `
        <polyline fill="none" stroke-linecap="round" stroke-linejoin="round" points="${segment.join(" ")}" />
      `).join("");
    }

      const text = `${item.label} ${item.title} ${item.pkg}`;
      if (text.includes("高价值") || text.includes("结构")) {

      }
      if (text.includes("托底") || text.includes("放量") || text.includes("转化")) {
        return "促转化";

      return "提效率";

      const deltaMap = {
        1: [2, -1, -1, 0],
        2: [1, 0, -1, 0],
        3: [1, 1, -1, -1],
        4: [2, -1, 0, -1],

        6: [2, 0, -1, -1],
        7: [3, -1, 0, -2],
        8: [2, -1, 0, -1],
        9: [1, 0, 1, -2],
        10: [0, 1, 0, -1],
        11: [-1, 0, 1, 0],
        12: [-1, 0, 0, 1]
      };
      const deltas = deltaMap[month] || [1, 0, 0, -1];
      return current.mix.map(([name, value], index) => [name, Math.max(0, value + deltas[index])]);
    }

    function renderStatus(status) {
      const map = {
        "执行中": ["dot-success", "tag success"],
        "已发布": ["dot-primary", "tag primary"],
        "跟进中": ["dot-warning", "tag warning"],
        "待执行": ["dot-warning", "tag warning"],
        "待反馈": ["dot-danger", "tag danger"],
        "已执行": ["dot-success", "tag success"],
        "效果最好": ["dot-success", "tag success"],
        "继续观察": ["dot-warning", "tag warning"],
        "建议回退": ["dot-danger", "tag danger"]
      };
      const current = map[status] || ["dot-success", "tag success"];
      const dotClass = current[0] === "dot-primary" ? "dot-success" : current[0];
      return `<span class="tag ${statusClass(status)}"><span class="status-dot ${dotClass}"></span>${status}</span>`;
    }

    function statusClass(status) {
      if (["执行中", "已执行", "效果最好"].includes(status)) return "success";
      if (["待执行", "跟进中", "继续观察"].includes(status)) return "warning";
      if (["待反馈", "建议回退"].includes(status)) return "danger";
      return "primary";
    }

    function trimCapacityPlanningHeader(frame) {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc) return;
        [".top-bar", ".tabs-container"].forEach(selector => {
          const node = doc.querySelector(selector);
          if (node) node.style.display = "none";
        });
        const mainContent = doc.querySelector(".main-content");
        if (mainContent) {
          mainContent.style.paddingTop = "0";
        }
      } catch (error) {
        console.warn("运力统筹子页面顶部裁剪失败", error);
      }
    }

    function renderCapacityPlanning() {
      return `
        <section class="embed-shell">
          <iframe
            class="embed-frame"
            src="../自动化开点/运力统筹_20260326.html"
            title="运力统筹"
            onload="trimCapacityPlanningHeader(this)"
          ></iframe>
        </section>
      `;
    }

    function switchPage(key) {
      if (!pages[key]) key = "console";
      state.currentPage = key;
      render();
    }

    function selectMonth(month) {
      state.selectedMonth = month;
      state.selectedConsoleStrategyIndex = 0;
      const strategyFocus = getConsoleStrategyFocus(month, monthData[month]);
      state.selectedConsoleTrackingWeek = strategyFocus.strategyRows[0]?.completedWeekIndex ?? 0;
      state.selectedConsoleIssueIndex = 0;
      state.consoleStoreKeyword = "";
      state.consoleStoreIssueFilter = "全部";
      state.consoleStoreStrategyFilter = "全部";
      state.selectedAlert = 0;
      render();
    }

    function selectAlert(index) {
      state.selectedAlert = index;
      render();
    }

    function selectLibraryFilter(type) {
      state.libraryFilter = type;
      render();
    }

    function toggleStrategyFollowup(month, strategyId) {
      const key = `${month}-${strategyId}`;
      const current = Object.prototype.hasOwnProperty.call(state.strategyFollowupsOpen, key)
        ? state.strategyFollowupsOpen[key]
        : false;
      state.strategyFollowupsOpen[key] = !current;
      render();
    }

    function updateStrategyWeekAction(month, strategyId, week, value) {
      if (!state.strategyWeekEdits[month]) {
        state.strategyWeekEdits[month] = {};
      }
      if (!state.strategyWeekEdits[month][strategyId]) {
        state.strategyWeekEdits[month][strategyId] = {};
      }
      state.strategyWeekEdits[month][strategyId][week] = value;
    }

    function executePackage(name) {
      const pkg = packageMap[name];
      state.published.unshift({
        name,
        scope: pkg.scope,
        cycle: pkg.cycle,
        status: "已执行",
        owner: "总部经营"
      });
      showToast(`${name} 已生成执行实例`);
      syncSidebar();
      render();
    }

    function openDrawer(name) {
      state.drawerPackage = name;
      const pkg = packageMap[name];
      document.getElementById("packageName").value = name;
      document.getElementById("packageScope").value = pkg.scope;
      document.getElementById("packageCycle").value = pkg.cycle;
      document.getElementById("drawerTitle").textContent = `${name}执行实例配置`;
      document.getElementById("drawerNote").textContent = pkg.desc;
      document.getElementById("drawer").classList.add("show");
      document.getElementById("drawerMask").classList.add("show");
    }

    function closeDrawer() {
      document.getElementById("drawer").classList.remove("show");
      document.getElementById("drawerMask").classList.remove("show");
    }

    function publishDrawer() {
      const name = state.drawerPackage;
      const scope = document.getElementById("packageScope").value;
      const cycle = document.getElementById("packageCycle").value;
      state.published.unshift({
        name,
        scope,
        cycle,
        status: "已执行",
        owner: "总部经营"
      });
      closeDrawer();
      syncSidebar();
      render();
      showToast(`${name} 已按新参数生成执行实例`);
    }

    function updateTask(id, status) {
      state.tasks = state.tasks.map(item => item.id === id ? { ...item, status } : item);
      render();
      showToast(`门店任务状态已更新为${status}`);
    }

    function showToast(text) {
      const toast = document.getElementById("toast");
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    function syncSidebar() {
      return;
    }

    function render() {
      const page = pages[state.currentPage];
      try {
        document.getElementById("workspace").innerHTML = page.render();
      } catch (error) {
        console.error(error);
        document.getElementById("workspace").innerHTML = `
          <div class="card">
            <div class="card-head">
              <div>
                <h3>页面加载失败</h3>
                <p>当前页面渲染异常，请刷新后重试；若仍异常，可继续查看控制台报错信息。</p>
              </div>
            </div>
            <div class="library-desc-list">
              <div class="library-desc-item">
                <strong>错误信息</strong>
                <p>${error.message}</p>
              </div>
            </div>
          </div>
        `;
      }
      renderNav();
      syncSidebar();
    }

    render();
  </script>
</body>
</html>
